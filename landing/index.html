<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <meta name="theme-color" content="#07090c"/>
  <title>RetroX — Self-hosted retro gaming, right in your browser</title>
  <meta name="description" content="Your retro console, served from your own machine."/>
  <link rel="icon" type="image/png" href="images/emulator-logo.png"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; }
    :root { --accent: #e5a00d; --glow: rgba(229,160,13,0.12); --canvas: #07090c; --surface: #0e1117; --border: #1e2330; --text: #f4f5f8; --muted: #9ca3af; --dim: #5b6270; }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: "Inter", system-ui, sans-serif; background: var(--canvas); color: var(--text); -webkit-font-smoothing: antialiased; }
    a { color: inherit; text-decoration: none; }

    .page { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 24px; position: relative; gap: 0; overflow: hidden; background: var(--canvas); }
    .page__bg { position: fixed; inset: 0; z-index: 0; }
    .page__bg img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; border-radius: 16px; opacity: 0; transition: opacity 1.5s ease; }
    .page__bg img.is-active { opacity: 0.9; }
    .page__bg::after { content: ""; position: absolute; inset: 0; background: radial-gradient(ellipse at center, rgba(229,160,13,0.05) 0%, rgba(7,9,12,0.4) 70%); z-index: 1; }
    @media (max-width: 1024px) {
      .page__bg { display: none; }
    }
    .page > *:not(.page__bg) { position: relative; z-index: 1; }

    .page__content { display: flex; flex-direction: column; align-items: center; position: relative; z-index: 1; padding: 48px 56px; border-radius: 24px; background: rgba(7,9,12,0.65); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }

    .mark { position: relative; margin-bottom: 20px; }
    .mark img { width: 100px; height: 100px; position: relative; z-index: 1; filter: drop-shadow(0 0 10px rgba(229, 160, 13, 0.8)); }
    .mark::after { content: ""; position: absolute; inset: -8px; border-radius: 22px; background: var(--glow); filter: blur(22px); z-index: 0; }

    .wordmark { font-family: "Space Grotesk", sans-serif; font-size: 52px; font-weight: 700; letter-spacing: -0.05em; line-height: 1; margin-bottom: 14px; }
    .wordmark em { color: var(--accent); font-style: normal; }

    .tagline { font-size: 20px; color: var(--muted); letter-spacing: -0.01em; margin-bottom: 40px; }

    .cta { display: inline-flex; align-items: center; gap: 10px; padding: 16px 36px; border-radius: 999px; background: var(--accent); color: #1a1306; font-size: 16px; font-weight: 600; transition: background .15s, transform .1s; box-shadow: 0 0 28px rgba(229,160,13,0.2); }
    .cta:hover { background: #f5b94d; box-shadow: 0 0 40px rgba(229,160,13,0.3); }
    .cta:active { transform: scale(0.97); }
    .cta svg { width: 18px; height: 18px; }

    .cmd { font-family: "JetBrains Mono", monospace; font-size: 14px; color: var(--dim); background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px 22px; user-select: all; }
    .cmd b { color: var(--accent); font-weight: 400; }

    .footer { position: absolute; bottom: 20px; font-size: 11px; color: var(--dim); }
    .footer a { color: var(--muted); }
    .footer a:hover { color: var(--text); }

    .showcase { display: none; }

    @media (max-width: 1024px) {
      html, body { overflow: auto; height: auto; }
      .page { height: auto; min-height: 100vh; justify-content: flex-start; padding: 48px 24px 32px; gap: 56px; overflow: visible; }
      .page__content { background: transparent; backdrop-filter: none; -webkit-backdrop-filter: none; padding: 0; border-radius: 0; }

      .mark { margin-bottom: 18px; }
      .mark img { width: 80px; height: 80px; }
      .wordmark { font-size: 52px; }
      .tagline { font-size: 18px; margin-bottom: 36px; }
      .cta { margin-bottom: 0; }

      .showcase { display: flex; flex-direction: column; gap: 36px; width: 100%; max-width: 520px; }
      .showcase__item { display: flex; flex-direction: column; gap: 10px; align-items: center; }
      .showcase__item img { width: 100%; height: auto; border-radius: 14px; border: 1px solid var(--border); display: block; box-shadow: 0 16px 40px rgba(0,0,0,0.55); }
      .showcase__item figcaption { font-family: "Space Grotesk", sans-serif; font-size: 16px; font-weight: 600; color: var(--text); letter-spacing: -0.01em; text-align: center; }

      .footer { position: static; bottom: auto; margin-top: 8px; font-size: 11px; }
    }
    @media (max-width: 480px) {
      .page { padding: 32px 16px 24px; gap: 40px; }
      .mark { margin-bottom: 14px; }
      .mark img { width: 60px; height: 60px; }
      .mark::after { inset: -5px; filter: blur(14px); }
      .wordmark { font-size: 38px; margin-bottom: 8px; }
      .tagline { font-size: 15px; margin-bottom: 28px; }
      .cta { padding: 12px 24px; font-size: 14px; }
      .footer { font-size: 10px; }
      .showcase { gap: 28px; max-width: 100%; }
      .showcase__item img { border-radius: 12px; box-shadow: 0 10px 28px rgba(0,0,0,0.5); }
      .showcase__item figcaption { font-size: 14px; }
    }
  </style>
</head>
<body>

<div class="page">
  <div class="page__bg">
    <img src="images/screenshot1.png" alt="" class="is-active"/>
    <img src="images/screenshot2.png" alt=""/>
    <img src="images/screenshot3.png" alt=""/>
    <img src="images/screenshot4.png" alt=""/>
  </div>
  <div class="page__content">
  <div class="mark"><img src="images/emulator-logo-transparent.png" alt="RetroX"/></div>
  <h1 class="wordmark"><em>Retro</em>X</h1>
  <p class="tagline">Self-hosted retro gaming, right in your browser.</p>
  <a class="cta" href="https://github.com/polius/RetroX">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.44 9.8 8.2 11.39.6.11.82-.26.82-.58v-2.03c-3.34.73-4.04-1.61-4.04-1.61-.55-1.39-1.34-1.76-1.34-1.76-1.09-.75.08-.73.08-.73 1.2.08 1.84 1.24 1.84 1.24 1.07 1.84 2.81 1.31 3.5 1 .1-.78.42-1.31.76-1.61-2.67-.3-5.47-1.33-5.47-5.93 0-1.31.47-2.38 1.24-3.22-.13-.3-.54-1.52.12-3.18 0 0 1-.32 3.3 1.23a11.5 11.5 0 0 1 6.02 0c2.28-1.55 3.29-1.23 3.29-1.23.66 1.66.25 2.88.12 3.18.77.84 1.24 1.91 1.24 3.22 0 4.61-2.81 5.63-5.48 5.92.43.37.81 1.1.81 2.22v3.29c0 .32.22.7.82.58C20.56 21.8 24 17.3 24 12c0-6.63-5.37-12-12-12z"/></svg>
    View on GitHub
  </a>
  </div>
  <section class="showcase" aria-label="Screenshots">
    <figure class="showcase__item">
      <img src="images/screenshot1.png" alt="Library" loading="lazy"/>
      <figcaption>Library</figcaption>
    </figure>
    <figure class="showcase__item">
      <img src="images/screenshot2.png" alt="Game details" loading="lazy"/>
      <figcaption>Game details</figcaption>
    </figure>
    <figure class="showcase__item">
      <img src="images/screenshot3.png" alt="Playing a game" loading="lazy"/>
      <figcaption>Playing a game</figcaption>
    </figure>
    <figure class="showcase__item">
      <img src="images/screenshot4.png" alt="Admin page" loading="lazy"/>
      <figcaption>Admin page</figcaption>
    </figure>
  </section>
  <footer class="footer"></footer>
</div>

<script>
  const imgs = document.querySelectorAll(".page__bg img");
  let current = 0;
  setInterval(() => {
    imgs[current].classList.remove("is-active");
    current = (current + 1) % imgs.length;
    imgs[current].classList.add("is-active");
  }, 5000);
</script>
</body>
</html>
