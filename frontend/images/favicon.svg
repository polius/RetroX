<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <rect width="64" height="64" rx="14" fill="#0c0907"/>
  <!-- Game Boy body -->
  <rect x="14" y="8" width="36" height="48" rx="5" fill="#e8a058"/>
  <!-- Screen -->
  <rect x="18" y="13" width="28" height="20" rx="2" fill="#cdd5dc"/>
  <!-- D-pad -->
  <g fill="#3c4356">
    <rect x="19" y="40" width="9" height="3" rx="1"/>
    <rect x="22" y="37" width="3" height="9" rx="1"/>
  </g>
  <!-- A/B buttons -->
  <circle cx="40" cy="38" r="2.4" fill="#d96878"/>
  <circle cx="44" cy="42" r="2.4" fill="#d96878"/>
  <!-- Start/Select dashes -->
  <g fill="#3c4356">
    <rect x="27" y="50" width="4" height="1.6" rx="0.8"/>
    <rect x="33" y="50" width="4" height="1.6" rx="0.8"/>
  </g>
</svg>
